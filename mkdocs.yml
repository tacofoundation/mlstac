site_name: MLSTAC
site_description: Machine learning model sharing built on STAC MLM and Safetensors.
site_url: https://tacofoundation.github.io/mlstac/
repo_url: https://github.com/tacofoundation/mlstac
repo_name: tacofoundation/mlstac

theme:
  name: material
  logo: assets/logo-white.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            docstring_style: google

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - User Guide:
      - Loading models: guide/loading-models.md
      - Downloading: guide/downloading.md
  - API Reference:
      - ModelLoader: api/modelloader.md
      - Functions: api/functions.md
  - About:
      - Changelog: about/changelog.md