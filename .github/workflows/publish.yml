name: Publish

# Runs when you publish a GitHub Release. Build the package and push it to PyPI.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Build the package
        run: poetry build

      - name: Publish to PyPI
        env:
          # Add this token in the repo: Settings > Secrets and variables >
          # Actions > New repository secret, named PYPI_TOKEN.
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish